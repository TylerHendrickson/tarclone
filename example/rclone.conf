# Example rclone remotes. The usual way to build this file is `rclone config`;
# this is just a minimal example of the resulting shape.
# The TARCLONE_REMOTE env var specifies which remote backend tarclone uploads to.

[my-remote-destination]
type = smb
host = nas.example.com
user = backup
# Recommended: Generate the obscured password with `rclone obscure 'YOUR_PASSWORD'`
# (note: `rclone obscure` is reversible obfuscation, NOT encryption)
pass = OBSCURED_PASSWORD_HERE
# port = 445

[my-s3-remote]
type = s3
provider = AWS
access_key_id = YOUR_ACCESS_KEY_ID
secret_access_key = YOUR_SECRET_ACCESS_KEY
region = us-east-1
# endpoint =            # set for S3-compatible providers (MinIO, Backblaze B2, Cloudflare R2, ...)
# HTTPS backend: in Docker, bind-mount CA certs (see example/docker-compose.yml).
