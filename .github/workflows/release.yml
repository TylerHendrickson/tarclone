name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  promote:
    # re-tag the exact multi-arch image CI already built and pushed as sha-<gitsha> (build-once, promote).
    # The tagged commit must have been built on main, or the source image won't exist and this fails loudly.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - suffix: ""
          - suffix: -http-client
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          # Only the release tag names are needed here — the image's metadata
          # (description, licenses, source, ...) is already baked into the index by
          # CI, and promote re-tags that index verbatim.
          images: ${{ env.IMAGE }}
          flavor: |
            latest=auto
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Promote sha-<gitsha> to release tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          # Verbatim re-tag of the exact image CI built, tested, and attested: no
          # --annotation, so the digest is preserved and the release tags share the
          # tested digest and its attestations. The semver lives in the tag name;
          # the index's version annotation stays sha-<gitsha> (its true provenance).
          # env.IMAGE embeds the owner verbatim (mixed-case); GHCR refs need lowercase.
          src="${IMAGE,,}:sha-${GITHUB_SHA}${SUFFIX}"
          args=()
          while IFS= read -r t; do [ -n "$t" ] && args+=(--tag "$t"); done <<< "$TAGS"
          docker buildx imagetools create "${args[@]}" "$src"
